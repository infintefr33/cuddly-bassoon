height":"48 px","width":"49 px"}},"subheading":{"value":"Special perks and unique experiences just for you. All for free - just for being a customer. The longer you're with us, the better it gets. Thanks for being with Xfinity.\u003Cbr class=\"t-last-br\" \u002F\u003E"},"rangeText":{"value":""},"heading":{"value":"Discover your diamond rewards!"}}}],"termsAndConditions":{"id":"bf6d3957-1d80-481f-969d-b2a55f6d6e99","url":"\u002Fdata\u002Frewards\u002Fterms-and-conditions\u002Floyalty-enrollment","name":"Loyalty Enrollment","displayName":"Loyalty Enrollment","fields":{"modalBody":{"value":"\u003C!--\u003Cp style=\"text-align: center;\"\u003E\u003Cstrong\u003E\u003Cspan\u003E&nbsp;Xfinity Rewards Program\u003C\u002Fspan\u003E\u003C\u002Fstrong\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: center;\"\u003E\u003Cstrong\u003E\u003Cspan\u003EGeneral Terms and Conditions\u003C\u002Fspan\u003E\u003C\u002Fstrong\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: center;\"\u003E\u003Cstrong\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fstrong\u003E\u003C\u002Fp\u003E--\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003EThe Xfinity Rewards Program (\"Program\") is a rewards program offered by Comcast Cable Communications Management, LLC (\"Xfinity\" or &ldquo;Comcast&rdquo;) that provides Members certain Rewards. These General Terms and Conditions and any additional terms associated with specific Rewards (collectively, &ldquo;Terms&rdquo;) apply to the Program. By participating in the Program, you (&ldquo;you&rdquo; or &ldquo;your&rdquo;) agree to these Terms.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E1.&nbsp;&nbsp;&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cspan style=\"text-decoration: underline;\"\u003EEligibility.\u003C\u002Fspan\u003E\u003Cspan\u003E To be eligible for the Program you must: &nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E(a)&nbsp;Be a current Xfinity post-pay TV or Internet, or Wireline Voice residential customer with a current and active Xfinity account in good-standing (“Account”); \u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E(b) Be 18 years of age or older and a legal resident of one of the fifty (50) United States or the District of Columbia; and\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E(c ) Enroll in the Program by following the procedures under Section 2. &nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003EEmployees who receive Xfinity courtesy services are not eligible to participate in the Program with respect to the address at which they receive Xfinity courtesy services. &nbsp;Employees, officers, directors, agents and representatives of Xfinity and its affiliates who are eligible and enroll in the Program may be not be eligible for all Rewards. &nbsp;&nbsp;&nbsp;The Program is limited to one (1) Account per customer\u002Fhousehold and may not be transferred. If a Member has multiple Accounts, the Account with the Member&rsquo;s longest Tenure shall be deemed to be the Program Account, but Rewards may be applied to the other Accounts. Customers who only receive Xfinity services through bulk or similar accounts, agreements, or arrangements through which services are paid by a third party, are not eligible to participate in the Program unless such customers have established individually billed Accounts and are purchasing a required service(s) under that Account. Members who redeem certain Rewards may be ineligible to redeem additional identified Rewards within specified periods.&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E2.&nbsp;&nbsp;&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cspan style=\"text-decoration: underline;\"\u003EEnrollment.\u003C\u002Fspan\u003E\u003Cspan\u003E To enroll in the Program, you must (1) \u003C\u002Fspan\u003E\u003Cspan\u003Evisit \u003Ca href=\"http:\u002F\u002Fwww.xfinity.com\u002Frewards\"\u003EXfinity.com\u002FRewards\u003C\u002Fa\u003E via your web browser or through the Xfinity App, (2) login using your Xfinity credentials and (3) click to enroll in the Program. By clicking to enroll you are accepting the Program Terms. Eligible Xfinity customers who enroll in the Program are referred to herein as &ldquo;Members&rdquo; or a &ldquo;Member&rdquo;. \u003C\u002Fspan\u003E\u003Cspan\u003EThe Program is for your personal use and may not be used for any business dealings or other commercial purpose.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E3.&nbsp;&nbsp;&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cspan style=\"text-decoration: underline;\"\u003EProgram Tiers.\u003C\u002Fspan\u003E\u003Cspan\u003E &nbsp;There are four (4) tiers (&ldquo;Tier(s)&rdquo;) of membership in the Program: Silver, Gold, Platinum, and Diamond.&nbsp; Each Tier and Rewards made available for each Tier will correspond to the amount of time a Member&rsquo;s Account remains continuously active and in good-standing, as determined by Xfinity in its sole discretion \u003C\u002Fspan\u003E\u003Cspan\u003E(that is your &ldquo;Tenure&rdquo;).\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E(a)&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cspan\u003EAs your Tenure increases and you advance Tiers, you will be eligible for more Rewards. &nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E(b)&nbsp; \u003C\u002Fspan\u003E\u003Cspan\u003EYour initial Tenure will be determined by the date on which you established your current Account with Xfinity.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E(c)&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cspan\u003EIf all of your eligible Xfinity services are for any reason ended, you will not be eligible to receive Rewards. If you reinstate an eligible service under an Account with the same Xfinity credentials you used to enroll in the Program within 90 days of ending your services, your Tenure status at the time of ending your services shall be reinstated. If you do not so reinstate an eligible service within the 90 day period, you will be automatically removed from the Program. You may not redeem Rewards once you cease to be a Member.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003EEach Tier will unlock certain benefits for Members to enjoy in the Program. Tier thresholds are solely determined by Xfinity and are subject to change. To view the current Tier thresholds, click \u003Cspan\u003E\u003Ca href=\"http:\u002F\u002Fwww.xfinity.com\u002Frewards\"\u003EXfinity.com\u002FRewards\u003C\u002Fa\u003E\u003C\u002Fspan\u003E\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E&nbsp;\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E4.&nbsp;&nbsp;&nbsp;&nbsp; \u003C\u002Fspan\u003E\u003Cstrong\u003E\u003Cspan\u003ERewards: \u003C\u002Fspan\u003E\u003C\u002Fstrong\u003E\u003Cspan\u003ERewards may include access to special events, limited-time offers, sweepstakes opportunities, product discounts, and other Rewards as may be established by Xfinity and offered under the Program from time to time.&nbsp; Rewards are referred to in these Terms as &ldquo;Rewards&rdquo; or a &ldquo;Reward&rdquo;.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003EThe Rewards available to a Member at any given time will depend on that Member&rsquo;s Tier level and are only available while supplies last. Rewards may be changed at any time by Xfinity. Rewards may have additional terms that apply, including without limitation, additional terms from any third-party company supplying the Reward (&ldquo;Rewards Partner(s)&rdquo;), an expiration date or other conditions. Members may be required to share information with Xfinity or any Rewards Partner in order to receive that Reward. Xfinity is not responsible for the acts or omissions of any Rewards Partner, including for the fulfillment of any Rewards. The information provided to the Rewards Partner to claim or use a Reward is subject to the privacy policy of the Rewards Partner. Only the primary Account owner of the Member&rsquo;s Account can claim and use Rewards.&nbsp; Members can check their individual Account for Reward details, including availability, claim instructions, information about expiration dates that may apply, and order status by \u003C\u002Fspan\u003E\u003Cspan\u003Evisiting \u003Ca href=\"http:\u002F\u002Fwww.xfinity.com\u002Frewards\"\u003EXfinity.com\u002FRewards\u003C\u002Fa\u003E via your web browser or through the Xfinity App login using your Xfinity credentials.&nbsp;&nbsp;&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003ERewards have no cash value (unless required by law) and cannot be sold, resold, returned, exchanged, or substituted, except by Xfinity who may in its sole discretion substitute Rewards at any time. Xfinity is not responsible for lost, stolen or damaged Rewards. If a Member lists a Reward for sale, or sells a Reward, the Reward may be forfeited and voided. Xfinity is not responsible for any taxes incurred by Members in connection with Rewards. Xfinity may be required to report taxable amounts related to Rewards to appropriate taxing authorities. Some Rewards may only be available to residents of a particular area or state. Rewards are subject to change, alteration, substitution, or termination by Xfinity in its sole discretion at any time.\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003E&nbsp;\u003C\u002Fspan\u003E\u003C\u002Fp\u003E\n\u003Cp style=\"text-align: justify;\"\u003E\u003Cspan\u003EUnless otherwise stated as part of a Reward, transportation to\u002Ffrom a Reward event will not be included. Rewards event dates, times and seating are determined at Xfinity&rsquo;s sole discretion and are subject to change. If a Member or their guest(s) cannot attend an event on the specified date, the Reward will be forfeited. Xfinity is not liable for replacing any lost, mutilated or stolen tickets to Rewards events. If any Reward event, or any events in connection with it, do not take place as scheduled, or are cancelled for any reason, including due to Acts of God (such as, but not limited to, fires, e
